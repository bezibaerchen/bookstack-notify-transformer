name: Bug report
description: Report a reproducible problem with bookstack-notify-transformer
title: "[Bug]: "
labels:
  - bug

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!

        Please remove passwords, API keys, webhook secrets and internal URLs before submitting.

  - type: input
    id: version
    attributes:
      label: Version
      placeholder: v0.1.1
    validations:
      required: true

  - type: input
    id: bookstack
    attributes:
      label: BookStack version
      placeholder: v25.xx
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the problem.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: shell
      description: Please remove sensitive information first.
